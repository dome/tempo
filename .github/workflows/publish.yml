name: Publish crates

permissions: {}

on:
  pull_request:
    types: [closed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  publish:
    name: Publish
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changelog-release/')
    runs-on: depot-ubuntu-latest-4
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Detect release groups in merged PR
        id: release-groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ./scripts/publish/detect_release_groups.py \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --alloy-crates contracts,primitives,alloy \
            --revm-crates chainspec,precompiles-macros,precompiles,revm \
            --context release \
            --label "Files changed in merged release PR:"

      - name: Validate release target detection
        if: steps.release-groups.outputs.alloy != 'true' && steps.release-groups.outputs.revm != 'true'
        run: |
          echo "No published crate groups were detected in the merged changelog release PR." >&2
          exit 1

      - name: Publish alloy crates via sanitize pipeline
        if: steps.release-groups.outputs.alloy == 'true'
        run: ./scripts/publish/alloy.sh --publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish revm stack crates via sanitize pipeline
        if: steps.release-groups.outputs.revm == 'true'
        run: ./scripts/publish/revm.sh --publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
