name: Semver check

permissions: {}

on:
  pull_request:
    branches: [main]
    paths:
      - crates/chainspec/**
      - crates/precompiles-macros/**
      - crates/precompiles/**
      - crates/revm/**
      - crates/contracts/**
      - crates/primitives/**
      - crates/alloy/**
      - scripts/publish/**
      - scripts/sanitize_source.py
      - scripts/sanitize_toml.py
      - Cargo.toml
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  semver-check:
    name: semver check
    runs-on: depot-ubuntu-latest-4
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-semver-checks
        run: cargo binstall -y cargo-semver-checks

      - name: Detect semver groups in PR
        if: github.event_name == 'pull_request'
        id: semver-groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 ./scripts/publish/detect_release_groups.py \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --alloy-crates contracts,primitives,alloy \
            --revm-crates chainspec,precompiles-macros,precompiles,revm \
            --context pr \
            --label "Files changed in PR:"

      - name: Validate semver target detection
        if: github.event_name == 'pull_request' && steps.semver-groups.outputs.alloy != 'true' && steps.semver-groups.outputs.revm != 'true'
        run: |
          echo "No published crate groups were detected for semver checks." >&2
          exit 1

      - name: Run semver checks on sanitized alloy crates
        if: github.event_name != 'pull_request' || steps.semver-groups.outputs.alloy == 'true'
        run: ./scripts/publish/alloy.sh --semver-check

      - name: Run semver checks on sanitized revm stack crates
        if: github.event_name != 'pull_request' || steps.semver-groups.outputs.revm == 'true'
        run: ./scripts/publish/revm.sh --semver-check
